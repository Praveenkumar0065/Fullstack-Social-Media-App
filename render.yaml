services:
  - type: web
    name: socialsphere-app
    env: docker
    dockerfilePath: ./backend_code/Dockerfile
    healthCheckPath: /health
    plan: free
    envVars:
      - key: APP_NAME
        value: Social Web App API
      - key: APP_VERSION
        value: 1.0.2
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: socialsphere
      - key: AUTH_TOKEN_SECRET
        sync: false
